compilers = ">=1.11.0,<2"
cmake = ">=4.2.3,<5"
cppcheck = ">=2.21.0,<3"
patchelf = ">=0.17.2,<0.18"
zlib = ">=1.3.2,<2"
curl = ">=8.18.0,<9"
wget = ">=1.25.0,<2"
eigen-abi-devel = ">=5.0.1.100,<6"
yaml-cpp = ">=0.8.0,<0.9"
msgpack-c = ">=6.1.0,<7"
zmqpp = ">=4.2.0,<5"
gtest = ">=1.17.0,<2"
cppzmq = ">=4.11.0,<5"
nlohmann_json = ">=3.12.0,<4"
just = ">=1.55.1,<2"
onnxruntime-cpp = ">=1.26.0,<2"
onnxruntime = ">=1.26.0,<2"
msgpack-cxx = ">=7.0.0,<8"
libboost-headers = ">=1.91.0,<2"
cuda-toolkit = ">=12.9.2,<13"
