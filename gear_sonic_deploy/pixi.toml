[workspace]
authors = ["nmarticorena <nicolas.marticorena.vidal@gmail.com>"]
channels = ["conda-forge"]
name = "gear_sonic_deploy"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
TensorRT_ROOT="$PIXI_PROJECT_ROOT/TensorRT"

[tasks]

[dependencies]
cuda = "12.9.*"
